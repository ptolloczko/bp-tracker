<tr class="border-t border-gray-200 hover:bg-gray-50">
  <td class="px-3 py-3 text-sm text-gray-600 whitespace-nowrap">
    {{ formatDate(reading().recordedAt) }}
  </td>
  <td class="px-3 py-3 text-sm font-medium text-center">
    <span aria-label="{{ reading().systolic }} mmHg systolic">{{ reading().systolic }}</span>
  </td>
  <td class="px-3 py-3 text-sm font-medium text-center">
    <span aria-label="{{ reading().diastolic }} mmHg diastolic">{{ reading().diastolic }}</span>
  </td>
  <td class="px-3 py-3 text-sm font-medium text-center">
    <span aria-label="{{ reading().pulse }} bpm pulse">{{ reading().pulse }}</span>
  </td>
  <td class="px-3 py-3 text-sm text-gray-500 max-w-xs">
    {{ reading().notes ? truncate(reading().notes!) : '' }}
  </td>
  <td class="px-3 py-3 text-sm whitespace-nowrap">
    @if (!confirmingDelete) {
      <button (click)="edit.emit()"
              class="text-blue-600 hover:underline focus:outline-none focus:ring-2 focus:ring-blue-500 rounded"
              [attr.aria-label]="'Edit reading from ' + formatDate(reading().recordedAt)">
        Edit
      </button>
      <button (click)="confirmingDelete = true"
              class="ml-3 text-red-600 hover:underline focus:outline-none focus:ring-2 focus:ring-red-500 rounded"
              [attr.aria-label]="'Delete reading from ' + formatDate(reading().recordedAt)">
        Delete
      </button>
    } @else {
      <span class="text-sm text-gray-700 mr-2">Delete?</span>
      <button (click)="delete.emit()"
              class="text-red-600 font-medium hover:underline focus:outline-none focus:ring-2 focus:ring-red-500 rounded"
              [attr.aria-label]="'Confirm delete reading from ' + formatDate(reading().recordedAt)">
        Yes
      </button>
      <button (click)="confirmingDelete = false"
              class="ml-2 text-gray-500 hover:underline focus:outline-none focus:ring-2 focus:ring-gray-400 rounded"
              aria-label="Cancel delete">
        No
      </button>
    }
  </td>
</tr>
