<div class="flex gap-8 p-4 bg-gray-50 rounded-lg" aria-live="polite" aria-atomic="true">
  <dl>
    <dt class="text-sm text-gray-500">Avg Systolic</dt>
    <dd class="text-2xl font-semibold">{{ averages()?.systolic ?? '—' }} <span class="sr-only">mmHg</span></dd>
  </dl>
  <dl>
    <dt class="text-sm text-gray-500">Avg Diastolic</dt>
    <dd class="text-2xl font-semibold">{{ averages()?.diastolic ?? '—' }} <span class="sr-only">mmHg</span></dd>
  </dl>
</div>
