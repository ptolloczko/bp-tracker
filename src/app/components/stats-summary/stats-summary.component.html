@if (averages()) {
  <div class="flex gap-12">
    <dl>
      <dt class="mat-body-small text-gray-500">Avg Systolic</dt>
      <dd class="mat-headline-small m-0">{{ averages()!.systolic }} <span class="sr-only">mmHg</span></dd>
    </dl>
    <dl>
      <dt class="mat-body-small text-gray-500">Avg Diastolic</dt>
      <dd class="mat-headline-small m-0">{{ averages()!.diastolic }} <span class="sr-only">mmHg</span></dd>
    </dl>
  </div>
} @else {
  <div class="flex gap-12">
    <dl>
      <dt class="mat-body-small text-gray-500">Avg Systolic</dt>
      <dd class="mat-headline-small m-0" aria-label="No data">—</dd>
    </dl>
    <dl>
      <dt class="mat-body-small text-gray-500">Avg Diastolic</dt>
      <dd class="mat-headline-small m-0" aria-label="No data">—</dd>
    </dl>
  </div>
}
