@if (readings().length === 0) {
  <p class="px-4 py-6 text-center text-gray-400">No readings yet. Add one above.</p>
} @else {
  <div class="overflow-x-auto">
    <table mat-table [dataSource]="readings()" aria-label="Blood pressure readings" class="w-full">

      <ng-container matColumnDef="recordedAt">
        <th mat-header-cell *matHeaderCellDef>Date &amp; Time</th>
        <td mat-cell *matCellDef="let r" class="whitespace-nowrap">{{ formatDate(r.recordedAt) }}</td>
      </ng-container>

      <ng-container matColumnDef="systolic">
        <th mat-header-cell *matHeaderCellDef class="text-center">Systolic</th>
        <td mat-cell *matCellDef="let r" class="text-center"
            [attr.aria-label]="r.systolic + ' mmHg systolic'">{{ r.systolic }}</td>
      </ng-container>

      <ng-container matColumnDef="diastolic">
        <th mat-header-cell *matHeaderCellDef class="text-center">Diastolic</th>
        <td mat-cell *matCellDef="let r" class="text-center"
            [attr.aria-label]="r.diastolic + ' mmHg diastolic'">{{ r.diastolic }}</td>
      </ng-container>

      <ng-container matColumnDef="pulse">
        <th mat-header-cell *matHeaderCellDef class="text-center">Pulse</th>
        <td mat-cell *matCellDef="let r" class="text-center"
            [attr.aria-label]="r.pulse + ' bpm'">{{ r.pulse }}</td>
      </ng-container>

      <ng-container matColumnDef="notes">
        <th mat-header-cell *matHeaderCellDef>Notes</th>
        <td mat-cell *matCellDef="let r" class="max-w-xs text-gray-500">
          {{ r.notes ? truncate(r.notes) : '' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let r" class="whitespace-nowrap">
          @if (deletingId() !== r.id) {
            <button mat-icon-button color="primary" (click)="edit.emit(r)"
                    [attr.aria-label]="'Edit reading from ' + formatDate(r.recordedAt)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deletingId.set(r.id)"
                    [attr.aria-label]="'Delete reading from ' + formatDate(r.recordedAt)">
              <mat-icon>delete</mat-icon>
            </button>
          } @else {
            <span class="text-sm mr-1">Delete?</span>
            <button mat-icon-button color="warn" (click)="delete.emit(r.id)"
                    [attr.aria-label]="'Confirm delete reading from ' + formatDate(r.recordedAt)">
              <mat-icon>check</mat-icon>
            </button>
            <button mat-icon-button (click)="deletingId.set(null)" aria-label="Cancel delete">
              <mat-icon>close</mat-icon>
            </button>
          }
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>
  </div>
}
