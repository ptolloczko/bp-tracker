@if (readings().length === 0) {
  <p class="py-8 text-center text-gray-400">No readings yet. Add one above.</p>
} @else {
  <div class="overflow-x-auto">
    <table class="min-w-full text-left" aria-label="Blood pressure readings">
      <thead>
        <tr class="border-b border-gray-200 text-xs font-semibold uppercase tracking-wide text-gray-500">
          <th scope="col" class="px-3 py-2">Date &amp; Time</th>
          <th scope="col" class="px-3 py-2 text-center">Systolic</th>
          <th scope="col" class="px-3 py-2 text-center">Diastolic</th>
          <th scope="col" class="px-3 py-2 text-center">Pulse</th>
          <th scope="col" class="px-3 py-2">Notes</th>
          <th scope="col" class="px-3 py-2">Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (reading of readings(); track reading.id) {
          <app-reading-row
            [reading]="reading"
            (edit)="edit.emit(reading)"
            (delete)="delete.emit(reading.id)" />
        }
      </tbody>
    </table>
  </div>
}
