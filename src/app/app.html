<mat-toolbar color="primary">
  <span>Blood Pressure Tracker</span>
</mat-toolbar>

<div class="mx-auto max-w-3xl px-4 py-6 flex flex-col gap-4">

  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ editingReading() ? 'Edit Reading' : 'Add Reading' }}</mat-card-title>
    </mat-card-header>
    <mat-card-content class="pt-4">
      <app-reading-form
        [reading]="editingReading()"
        (saved)="onSaved($event)"
        (cancelled)="onCancelled()" />
    </mat-card-content>
  </mat-card>

  <mat-card aria-live="polite" aria-atomic="true">
    <mat-card-header>
      <mat-card-title>Averages</mat-card-title>
    </mat-card-header>
    <mat-card-content class="pt-4">
      <app-stats-summary [averages]="averages()" />
    </mat-card-content>
  </mat-card>

  <mat-card>
    <mat-card-header>
      <mat-card-title>Readings</mat-card-title>
    </mat-card-header>
    <app-reading-list
      [readings]="readings()"
      (edit)="onEdit($event)"
      (delete)="onDelete($event)" />
  </mat-card>

</div>
