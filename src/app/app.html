<div class="min-h-screen bg-gray-100">
  <div class="mx-auto max-w-3xl px-4 py-8">

    <h1 class="mb-6 text-2xl font-bold text-gray-800">Blood Pressure Tracker</h1>

    <section class="mb-4 rounded-lg bg-white p-6 shadow-sm" aria-label="Add or edit reading">
      <h2 class="mb-4 text-base font-semibold text-gray-700">
        {{ editingReading() ? 'Edit Reading' : 'Add Reading' }}
      </h2>
      <app-reading-form
        [reading]="editingReading()"
        (saved)="onSaved($event)"
        (cancelled)="onCancelled()" />
    </section>

    <section class="mb-4 rounded-lg bg-white p-6 shadow-sm" aria-label="Summary statistics">
      <h2 class="mb-3 text-base font-semibold text-gray-700">Averages</h2>
      <app-stats-summary [averages]="averages()" />
    </section>

    <section class="rounded-lg bg-white shadow-sm" aria-label="Reading list">
      <h2 class="px-6 pt-6 pb-2 text-base font-semibold text-gray-700">Readings</h2>
      <app-reading-list
        [readings]="readings()"
        (edit)="onEdit($event)"
        (delete)="onDelete($event)" />
    </section>

  </div>
</div>
